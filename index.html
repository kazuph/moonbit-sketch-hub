<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sketch Hub - MoonBit Creative Coding</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #1e1e2e; color: #cdd6f4; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    header { background: #181825; padding: 8px 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #313244; flex-shrink: 0; flex-wrap: wrap; }
    header h1 { font-size: 0.95rem; font-weight: 600; color: #cba6f7; }
    header .actions { margin-left: auto; display: flex; gap: 6px; }
    header button { background: #89b4fa; color: #1e1e2e; border: none; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: background 0.15s; }
    header button:hover { background: #74c7ec; }
    header button.secondary { background: #45475a; color: #cdd6f4; }
    header button.secondary:hover { background: #585b70; }
    header button.toggle { background: #313244; color: #cdd6f4; font-size: 0.75rem; padding: 5px 10px; }
    header button.toggle:hover { background: #45475a; }

    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

    /* File Browser - overlay drawer, hidden by default */
    .file-browser { position: absolute; top: 0; left: 0; width: 220px; height: 100%; background: #181825; border-right: 1px solid #313244; overflow-y: auto; z-index: 10; transform: translateX(-100%); transition: transform 0.2s ease; }
    .file-browser.open { transform: translateX(0); }
    .file-browser-header { padding: 10px 12px; font-size: 0.75rem; color: #6c7086; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #313244; display: flex; justify-content: space-between; align-items: center; }
    .file-browser-header .close-btn { background: none; border: none; color: #6c7086; cursor: pointer; font-size: 1.1rem; padding: 0 4px; }
    .file-browser-header .close-btn:hover { color: #cdd6f4; }
    .file-item { padding: 10px 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: #a6adc8; transition: background 0.1s; border-left: 3px solid transparent; }
    .file-item:hover { background: #1e1e2e; color: #cdd6f4; }
    .file-item.active { background: #1e1e2e; color: #cba6f7; border-left-color: #cba6f7; }
    .file-icon { font-size: 0.7rem; color: #585b70; font-family: monospace; min-width: 18px; }
    .file-item.active .file-icon { color: #cba6f7; }
    .file-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-browser-backdrop { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 9; }
    .file-browser-backdrop.open { display: block; }

    /* Preview - on top, fixed square */
    .preview-pane { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; border-bottom: 1px solid #313244; }
    .preview-pane .tab-bar { background: #181825; padding: 4px 12px; font-size: 0.75rem; color: #6c7086; border-bottom: 1px solid #313244; flex-shrink: 0; width: 100%; }
    .preview-pane iframe { width: calc(100vw - 16px); max-width: 400px; height: calc(100vw - 16px); max-height: 400px; border: none; background: #1e1e2e; border-radius: 8px; }

    /* Editor - fills remaining space below preview */
    .editor-pane { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
    .editor-pane .tab-bar { background: #181825; padding: 6px 12px; font-size: 0.75rem; color: #6c7086; border-bottom: 1px solid #313244; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .tab-bar .dot { width: 8px; height: 8px; border-radius: 50%; background: #a6e3a1; }
    .editor-pane .editor-wrapper { flex: 1; overflow: auto; }

    .cm-editor { height: 100%; }
    .cm-editor .cm-scroller { overflow: auto; }
  </style>
</head>
<body>
  <header>
    <button class="toggle" id="menu-btn">Examples</button>
    <h1>Sketch Hub</h1>
    <div class="actions">
      <span id="status" style="color:#6c7086;font-size:0.75rem;"></span>
      <button id="run-btn">Run</button>
      <button class="secondary" id="reset-btn">Reset</button>
    </div>
  </header>
  <div class="main">
    <div class="file-browser-backdrop" id="file-backdrop"></div>
    <div class="file-browser" id="file-drawer">
      <div class="file-browser-header">
        Examples
        <button class="close-btn" id="file-close">&times;</button>
      </div>
      <div id="file-browser"></div>
    </div>
    <div class="preview-pane">
      <div class="tab-bar">Preview</div>
      <iframe id="preview"></iframe>
    </div>
    <div class="editor-pane">
      <div class="tab-bar"><span class="dot"></span> sketch.mbt</div>
      <div class="editor-wrapper" id="editor"></div>
    </div>
  </div>
  <link rel="stylesheet" href="/moonpad/bootstrap.css">
  <script type="module" src="/moonpad/bootstrap.js"></script>
</body>
</html>
